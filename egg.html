<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Man is surprised to see you.</title>

<style>
  body {
    margin: 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  img {
    max-width: 300px;
    height: auto;
  }
</style>
</head>

<body>

  <!-- Centered Tree GIF -->
  <img src="https://media.tenor.com/xZD_mI2fY58AAAAj/deltarune-tree.gif" alt="Tree">

  <!-- Background Audio -->
  <audio id="bgMusic" loop>
    <source src="theman.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("bgMusic");

    // Force play on first click (bypasses browser autoplay block)
    document.addEventListener("click", () => {
      audio.play();
    });
  </script>

</body>
</html>
